<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এডমিন ড্যাশবোর্ড - গোবিন্দগঞ্জ কেজি স্কুল</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .logout-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: #e74c3c;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 22px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .stat {
            margin: 12px 0;
            font-size: 16px;
        }
        .stat-label {
            font-weight: bold;
            color: #7f8c8d;
        }
        .stat-value {
            color: #2c3e50;
            font-size: 20px;
            font-weight: bold;
            margin-left: 10px;
        }
        .edit-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .edit-section h3 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .edit-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .edit-btn {
            background: #3498db;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .edit-btn:hover {
            background: #2980b9;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>👑 এডমিন ড্যাশবোর্ড</h2>
        <button class="logout-btn" onclick="logout()">🚪 লগআউট</button>
    </div>
    
    <div class="container">
        <div id="summary" class="summary-grid">
            <div class="loading">লোড হচ্ছে...</div>
        </div>
        
        <div class="edit-section">
            <h3>⚙️ এডমিন কন্ট্রোল প্যানেল</h3>
            <div class="edit-buttons">
                <button class="edit-btn" onclick="showEditModal()">✏️ ক্লাস তথ্য সম্পাদনা</button>
                <button class="edit-btn" onclick="addNewStudent()">➕ নতুন শিক্ষার্থী যোগ</button>
                <button class="edit-btn" onclick="generateReport()">📊 রিপোর্ট জেনারেট</button>
                <button class="edit-btn" onclick="exportData()">📥 ডাটা এক্সপোর্ট</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzn-gYLEZNt1J9DMb8iHKvF3lue1uIvXSS2b4NlFHe4KT8sR0dOu9LT0MYE3yA1abjvnA/exec';

        async function loadSummary() {
            try {
                const response = await fetch(`${API_URL}?action=getSummary`);
                const data = await response.json();
                
                if(data.success && data.summary) {
                    const summaryDiv = document.getElementById('summary');
                    summaryDiv.innerHTML = '';
                    
                    data.summary.forEach(item => {
                        summaryDiv.innerHTML += `
                            <div class="card">
                                <h3>📚 ${item.className}</h3>
                                <div class="stat">
                                    <span class="stat-label">মোট শিক্ষার্থী:</span>
                                    <span class="stat-value">${item.totalStudents} জন</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">জানুয়ারি উপস্থিতি (গড়):</span>
                                    <span class="stat-value">${item.janAttendance}%</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">বার্ষিক পরীক্ষা পাসের হার:</span>
                                    <span class="stat-value">${item.passRate}%</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    document.getElementById('summary').innerHTML = '<div class="loading">কোন ডাটা পাওয়া যায়নি</div>';
                }
            } catch(error) {
                document.getElementById('summary').innerHTML = '<div class="loading">সার্ভার সংযোগে সমস্যা!</div>';
                console.error('Error:', error);
            }
        }

        function showEditModal() {
            alert('📝 ক্লাস তথ্য সম্পাদনা ফিচার - শীঘ্রই আসছে');
        }

        function addNewStudent() {
            const className = prompt('কোন ক্লাসে যোগ করবেন? (নার্সারি/প্লে/ক্লাস ওয়ান/ক্লাস টু/ক্লাস থ্রি/ক্লাস ফোর/ক্লাস ফাইভ)');
            if(className) {
                alert(`নতুন শিক্ষার্থী ${className} ক্লাসে যোগ করার ফর্ম খুলবে`);
            }
        }

        function generateReport() {
            alert('📄 সম্পূর্ণ রিপোর্ট জেনারেট হচ্ছে...');
        }

        function exportData() {
            alert('📁 ডাটা এক্সপোর্ট শুরু হয়েছে');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadSummary();
    </script>
</body>
</html>
