<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গোবিন্দগঞ্জ কেজি স্কুল</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .school-name {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .demo-info {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏫 গোবিন্দগঞ্জ কিন্ডারগার্টেন কেজি স্কুল</h1>
        <div class="school-name">লগইন করুন</div>
        
        <input type="text" id="userId" placeholder="ইউজার আইডি">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        
        <button onclick="login()">🔓 লগইন করুন</button>
        <div id="errorMsg" class="error"></div>
        
        <div class="demo-info">
            <strong>ডেমো লগইন:</strong><br>
            👑 এডমিন: userId: admin, পাস: admin123<br>
            📊 অপারেটর: userId: operator, পাস: op123<br>
            🧑‍🎓 শিক্ষার্থী: userId: 101, পাস: 1234 (প্লে ক্লাস)
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

        async function login() {
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;

            if(!userId || !password) {
                document.getElementById('errorMsg').innerText = 'সব তথ্য পূরণ করুন';
                return;
            }

            try {
                const response = await fetch(`${API_URL}?action=login&userId=${userId}&password=${password}`);
                const data = await response.json();
                
                if(data.success) {
                    localStorage.setItem('userData', JSON.stringify(data.userData));
                    
                    if(data.userData.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if(data.userData.role === 'operator') {
                        window.location.href = 'operator-dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                } else {
                    document.getElementById('errorMsg').innerText = data.message;
                }
            } catch(error) {
                document.getElementById('errorMsg').innerText = 'সার্ভার সংযোগে সমস্যা!';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
