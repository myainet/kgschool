<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>শিক্ষার্থী ড্যাশবোর্ড</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.2);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .logout-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: #e74c3c;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .info-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .info-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            font-size: 22px;
        }
        .student-name {
            font-size: 28px;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .student-details {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .attendance {
            font-size: 48px;
            color: #27ae60;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #27ae60;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .subject {
            font-weight: bold;
            color: #2c3e50;
        }
        .marks {
            color: #e67e22;
            font-weight: bold;
            font-size: 18px;
        }
        .grade {
            font-size: 36px;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
        }
        .grade-Aplus { background: #27ae60; color: white; }
        .grade-A { background: #2ecc71; color: white; }
        .grade-B { background: #3498db; color: white; }
        .grade-C { background: #f39c12; color: white; }
        .grade-F { background: #e74c3c; color: white; }
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>📚 শিক্ষার্থী ড্যাশবোর্ড</h2>
        <button class="logout-btn" onclick="logout()">🚪 লগআউট</button>
    </div>
    
    <div class="container" id="dashboard">
        <div class="loading">লোড হচ্ছে...</div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

        async function loadStudentData() {
            const userData = JSON.parse(localStorage.getItem('userData'));
            
            if(!userData || userData.role !== 'student') {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}?action=getStudentData&className=${encodeURIComponent(userData.className)}&roll=${userData.id}`);
                const data = await response.json();
                
                if(data.success && data.student) {
                    const student = data.student;
                    const attendancePercent = (student.janAttendance / 22) * 100;
                    
                    let gradeClass = '';
                    if(student.grade === 'A+') gradeClass = 'grade-Aplus';
                    else if(student.grade === 'A') gradeClass = 'grade-A';
                    else if(student.grade === 'B') gradeClass = 'grade-B';
                    else if(student.grade === 'C') gradeClass = 'grade-C';
                    else gradeClass = 'grade-F';
                    
                    document.getElementById('dashboard').innerHTML = `
                        <div class="info-card">
                            <div class="student-name">👨‍🎓 ${student.name}</div>
                            <div class="student-details">
                                📖 ক্লাস: ${student.className} | 🔢 রোল: ${student.roll}
                            </div>
                        </div>
                        
                        <div class="info-card">
                            <h3>📅 জানুয়ারি ২০২৬ - উপস্থিতি</h3>
                            <div class="attendance">${student.janAttendance} / ২২ দিন</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${attendancePercent}%">
                                    ${Math.round(attendancePercent)}%
                                </div>
                            </div>
                            <p style="text-align:center; margin-top:10px;">🎯 আপনার উপস্থিতির হার ${Math.round(attendancePercent)}%</p>
                        </div>
                        
                        <div class="info-card">
                            <h3>📊 বার্ষিক পরীক্ষার ফলাফল ২০২৬</h3>
                            <div class="result-item">
                                <span class="subject">📖 বাংলা</span>
                                <span class="marks">${student.banglaMarks} / ১০০</span>
                            </div>
                            <div class="result-item">
                                <span class="subject">🇬🇧 ইংরেজি</span>
                                <span class="marks">${student.englishMarks} / ১০০</span>
                            </div>
                            <div class="result-item">
                                <span class="subject">🔢 গণিত</span>
                                <span class="marks">${student.mathMarks} / ১০০</span>
                            </div>
                            <div class="result-item" style="background:#667eea20">
                                <span class="subject">📊 মোট নম্বর</span>
                                <span class="marks" style="font-size:22px;">${student.totalMarks} / ৩০০</span>
                            </div>
                            <div class="grade ${gradeClass}">
                                🎓 গ্রেড: ${student.grade}
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('dashboard').innerHTML = '<div class="loading">❌ আপনার ডাটা পাওয়া যায়নি</div>';
                }
            } catch(error) {
                document.getElementById('dashboard').innerHTML = '<div class="loading">⚠️ সার্ভার সংযোগে সমস্যা!</div>';
                console.error('Error:', error);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadStudentData();
    </script>
</body>
</html>
